<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨与王朝 · 文史知识库</title>
<style>
:root{
  --paper:#f6f1e7;
  --card:#fffdf7;
  --ink:#2b2b2b;
  --ink-light:#7a7060;
  --cinnabar:#9e3b2b;
  --cinnabar-deep:#7e2e21;
  --gold:#b8944a;
  --line:#e5dac4;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong","SimSun",serif;
  min-height:100vh;
  background-image:radial-gradient(rgba(184,148,74,.06) 1px, transparent 1px);
  background-size:26px 26px;
}

/* ===== 页眉 ===== */
header{
  max-width:1080px;margin:0 auto;padding:56px 24px 30px;
  display:flex;align-items:center;gap:22px;flex-wrap:wrap;
}
.seal{
  width:76px;height:76px;flex:none;
  background:var(--cinnabar);color:#fff;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;font-weight:700;
  box-shadow:3px 3px 0 rgba(158,59,43,.25);
  transform:rotate(-3deg);
  user-select:none;
}
.header-text h1{font-size:38px;letter-spacing:6px;font-weight:700}
.header-text .en{
  color:var(--gold);font-size:13px;letter-spacing:4px;
  text-transform:uppercase;margin-top:4px;font-style:italic;
}
.header-text .sub{color:var(--ink-light);margin-top:8px;font-size:15px;letter-spacing:2px}
.couplet{
  margin-left:auto;
  writing-mode:vertical-rl;
  color:var(--ink-light);
  letter-spacing:8px;font-size:15px;
  border-left:1px solid var(--line);
  padding-left:18px;height:130px;
  user-select:none;
}
.divider{
  max-width:1080px;margin:0 auto;padding:0 24px;
}
.divider::after{
  content:"";display:block;height:6px;
  border-top:2px solid var(--ink);
  border-bottom:1px solid var(--ink);
  opacity:.75;
}

/* ===== 工具栏 ===== */
.toolbar{
  max-width:1080px;margin:30px auto 0;padding:0 24px;
  display:flex;flex-direction:column;gap:16px;
}
.search-box{position:relative;max-width:460px}
.search-box input{
  width:100%;padding:12px 18px 12px 44px;
  font-size:16px;font-family:inherit;
  background:var(--card);color:var(--ink);
  border:1px solid var(--line);border-radius:999px;
  outline:none;transition:border-color .2s, box-shadow .2s;
}
.search-box input:focus{border-color:var(--cinnabar);box-shadow:0 0 0 3px rgba(158,59,43,.12)}
.search-box::before{
  content:"⌕";position:absolute;left:18px;top:50%;
  transform:translateY(-50%);font-size:20px;color:var(--ink-light);
}
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.tab{
  padding:7px 20px;font-size:15px;font-family:inherit;
  background:transparent;color:var(--ink-light);
  border:1px solid var(--line);border-radius:999px;
  cursor:pointer;transition:all .2s;letter-spacing:2px;
}
.tab:hover{border-color:var(--cinnabar);color:var(--cinnabar)}
.tab.active{
  background:var(--cinnabar);border-color:var(--cinnabar);color:#fff;
}
.count{color:var(--ink-light);font-size:14px;letter-spacing:1px}
.count b{color:var(--cinnabar);font-size:16px}

/* ===== 卡片列表 ===== */
main{max-width:1080px;margin:26px auto 60px;padding:0 24px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}
.card{
  display:block;background:var(--card);
  border:1px solid var(--line);border-radius:12px;
  padding:22px 24px;text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
  transition:transform .2s, box-shadow .2s, border-color .2s;
}
.card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--cinnabar);opacity:0;transition:opacity .2s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 24px rgba(43,43,43,.10);
  border-color:var(--cinnabar);
}
.card:hover::before{opacity:1}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tag{
  font-size:12px;letter-spacing:2px;color:var(--cinnabar);
  border:1px solid var(--cinnabar);border-radius:4px;padding:2px 8px;
}
.date{font-size:13px;color:var(--ink-light)}
.card h2{font-size:20px;font-weight:700;letter-spacing:1px;line-height:1.5}
.card p{
  margin-top:8px;font-size:14px;color:var(--ink-light);
  line-height:1.7;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card .go{
  margin-top:12px;font-size:13px;color:var(--gold);letter-spacing:2px;
}
.empty{
  text-align:center;color:var(--ink-light);
  padding:70px 0;font-size:16px;letter-spacing:2px;
}

/* ===== 页脚 ===== */
footer{
  border-top:1px solid var(--line);
  text-align:center;padding:26px 20px;
  color:var(--ink-light);font-size:13px;letter-spacing:2px;
}
footer .dot{color:var(--cinnabar)}

@media (max-width:640px){
  header{padding:36px 20px 22px}
  .header-text h1{font-size:28px;letter-spacing:3px}
  .couplet{display:none}
  .seal{width:60px;height:60px;font-size:34px}
}
</style>
</head>
<body>

<header>
  <div class="seal">墨</div>
  <div class="header-text">
    <h1>墨与王朝</h1>
    <div class="en">Ink &amp; Empire</div>
    <div class="sub">文 史 知 识 库</div>
  </div>
  <div class="couplet">以笔墨载王朝兴衰</div>
</header>
<div class="divider"></div>

<div class="toolbar">
  <div class="search-box">
    <input id="search" type="text" placeholder="搜索标题或简介……">
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="count" id="count"></div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>未找到相关内容，换个关键词试试</div>
</main>

<footer>
  墨与王朝 <span class="dot">·</span> ink-and-empire <span class="dot">·</span> 以笔墨载王朝兴衰
</footer>

<script>
/* ══════════════════════════════════════════════════════════════
   ★★★  添加新网页：只需在下面大括号列表中【加一行】即可  ★★★
   ──────────────────────────────────────────────────────────
   格式（照抄这一行，改掉引号里的内容，末尾逗号别漏）：

   { title:"网页标题", url:"文件名.html", category:"历史", desc:"一句话简介", date:"2026-07-18" },

   · category 可随意命名（如：历史、文学、人物、制度），
     分类按钮会根据你填的内容【自动生成】，无需改其他地方。
   · date 填上传日期，网页会按日期自动把最新的排在最前。
   ══════════════════════════════════════════════════════════════ */
const pages = [
  { title:"离骚", url:"lisao.html", category:"文学", desc:"屈原代表作，中国浪漫主义文学的源头。", date:"2026-07-18" },
  { title:"三国志卷一·魏书一·武帝纪第一", url:"sanguozhi/index.html", category:"历史", desc:"治世之能臣，乱世之奸雄。", date:"2026-07-17" },
];

/* ════════ 以下为程序逻辑，添加网页时无需改动 ════════ */
const grid   = document.getElementById('grid');
const tabsBox= document.getElementById('tabs');
const count  = document.getElementById('count');
const empty  = document.getElementById('empty');
const search = document.getElementById('search');

let activeCat = '全部';
let keyword   = '';

// 按日期倒序（新的在前）
const sorted = [...pages].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

// 自动生成分类按钮
function buildTabs(){
  const cats = ['全部', ...new Set(pages.map(p=>p.category))];
  tabsBox.innerHTML = '';
  cats.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'tab' + (c===activeCat ? ' active' : '');
    btn.textContent = c;
    btn.onclick = ()=>{ activeCat = c; buildTabs(); render(); };
    tabsBox.appendChild(btn);
  });
}

function render(){
  const kw = keyword.trim().toLowerCase();
  const list = sorted.filter(p=>{
    const inCat = activeCat==='全部' || p.category===activeCat;
    const inKw  = !kw || (p.title+p.desc+p.category).toLowerCase().includes(kw);
    return inCat && inKw;
  });

  grid.innerHTML = list.map(p=>`
    <a class="card" href="${p.url}">
      <div class="card-top">
        <span class="tag">${p.category}</span>
        <span class="date">${p.date||''}</span>
      </div>
      <h2>${p.title}</h2>
      <p>${p.desc}</p>
      <div class="go">阅 读 →</div>
    </a>`).join('');

  empty.hidden = list.length>0;
  count.innerHTML = `共收录 <b>${pages.length}</b> 篇` +
    (list.length!==pages.length ? `，当前显示 <b>${list.length}</b> 篇` : '');
}

search.addEventListener('input', e=>{ keyword = e.target.value; render(); });

buildTabs();
render();
</script>
</body>
</html>
